version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ecommerce-health-monitor
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - UPTIME_CRON=*/30 * * * *
      - WPO_CRON=0 */2 * * *
      - SEO_CRON=0 */4 * * *
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: node .next/standalone/server.js
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: easypanel_internal