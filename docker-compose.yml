version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ecommerce-health-monitor
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - PORT=80
      - DATABASE_URL=file:/app/data/dev.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ecommerce-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ecommerce-data:

networks:
  default:
    name: easypanel_internal